<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I Love You ❤️</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background:#000; overflow:hidden;
  width:100%; height:100%;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
}
canvas { display:block; touch-action:none; }

#hint {
  position:fixed;
  bottom:max(24px, env(safe-area-inset-bottom, 24px));
  left:50%; transform:translateX(-50%);
  color:rgba(255,120,190,0.85);
  font-family:'Dancing Script',cursive;
  font-size:clamp(13px,3.5vw,17px);
  pointer-events:none;
  text-shadow:0 0 12px #ff1493;
  white-space:nowrap;
  animation:fadeHint 3.5s ease forwards 2.5s;
}
@keyframes fadeHint{ 0%{opacity:1} 100%{opacity:0} }

#zoom-btns {
  position:fixed;
  right:max(16px, env(safe-area-inset-right, 16px));
  top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; gap:12px; z-index:20;
}
.zbtn {
  width:clamp(40px,11vw,50px); height:clamp(40px,11vw,50px);
  background:rgba(255,20,147,0.18);
  border:1.5px solid rgba(255,77,166,0.5);
  border-radius:50%;
  color:#ff4da6; font-size:clamp(18px,5vw,24px); line-height:1;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  text-shadow:0 0 8px #ff1493;
  box-shadow:0 0 14px rgba(255,20,147,0.25);
  -webkit-tap-highlight-color:transparent;
  user-select:none; transition:background .15s;
}
.zbtn:active { background:rgba(255,20,147,0.45); }
</style>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">✦ Drag to spin · Pinch or scroll to zoom ✦</div>
<div id="zoom-btns">
  <div class="zbtn" id="zin">+</div>
  <div class="zbtn" id="zout">−</div>
</div>

<script>
/* ═══════════════════════════════════════════════
   🖼️  YOUR IMAGES — put files in images/ folder
═══════════════════════════════════════════════ */
const IMAGE_FILES = [
  'images/photo1.jpg',
  'images/photo2.jpg',
  'images/photo3.jpg',
  'images/photo4.jpg',
  'images/photo5.jpg',
  'images/photo6.jpg',
];

/* ═══════════════════════════════════════════════
   💬  FLOATING TEXT
═══════════════════════════════════════════════ */
const LOVE_TEXT = 'I love you';

/* ═══════════════════════════════════════════════
   🎨  GLOW COLORS
═══════════════════════════════════════════════ */
const COLORS = [
  {fill:'#ff4da6', shadow:'#ff1493'},
  {fill:'#dd66ff', shadow:'#9900ff'},
  {fill:'#ffbbdd', shadow:'#ff69b4'},
  {fill:'#ff88cc', shadow:'#ff0066'},
];

/* ─── canvas ─── */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, DPR;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ─── camera ─── */
let rotY = 0, rotX = 0;
let velY = 0, velX = 0;
let zoom = 1.0, targetZoom = 1.0;
const ZOOM_MIN = 0.35, ZOOM_MAX = 2.4;

/* ─── drag (mouse) ─── */
let dragging = false, lastMX = 0, lastMY = 0, dVX = 0, dVY = 0;

function startDrag(x, y){ dragging=true; lastMX=x; lastMY=y; dVX=0; dVY=0; }
function moveDrag(x, y){
  if(!dragging) return;
  dVX = (x - lastMX) * 0.005;
  dVY = (y - lastMY) * 0.004;
  rotY += dVX;
  rotX += dVY;
  rotX = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, rotX));
  lastMX = x; lastMY = y;
}
function endDrag(){ if(!dragging)return; dragging=false; velY=dVX; velX=dVY; }

canvas.addEventListener('mousedown',  e => startDrag(e.clientX, e.clientY));
window.addEventListener('mousemove',  e => moveDrag(e.clientX, e.clientY));
window.addEventListener('mouseup',    endDrag);

/* ─── scroll zoom ─── */
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  targetZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, targetZoom + (e.deltaY > 0 ? -0.12 : 0.12)));
}, {passive:false});

/* ─── touch (drag + pinch) ─── */
let activeTouches = {};
let lastPinchDist = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for(const t of e.changedTouches) activeTouches[t.identifier] = {x:t.clientX, y:t.clientY};
  if(e.touches.length === 1) startDrag(e.touches[0].clientX, e.touches[0].clientY);
  if(e.touches.length >= 2){ dragging=false; lastPinchDist=null; }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if(e.touches.length === 1 && dragging){
    moveDrag(e.touches[0].clientX, e.touches[0].clientY);
  }
  if(e.touches.length >= 2){
    const t0=e.touches[0], t1=e.touches[1];
    const dx=t0.clientX-t1.clientX, dy=t0.clientY-t1.clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lastPinchDist !== null){
      const delta = (dist - lastPinchDist) * 0.006;
      targetZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, targetZoom + delta));
    }
    lastPinchDist = dist;
  }
}, {passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for(const t of e.changedTouches) delete activeTouches[t.identifier];
  if(e.touches.length < 2) lastPinchDist = null;
  if(e.touches.length === 0) endDrag();
}, {passive:false});

/* ─── zoom buttons ─── */
document.getElementById('zin').addEventListener('click',  () => targetZoom = Math.min(ZOOM_MAX, targetZoom+0.22));
document.getElementById('zout').addEventListener('click', () => targetZoom = Math.max(ZOOM_MIN, targetZoom-0.22));

/* ─── stars ─── */
const STARS = Array.from({length:160}, () => ({
  x: Math.random()*2-1, y: Math.random()*2-1,
  r: Math.random()*1.2+0.2,
  a: Math.random()*.7+.2,
  tw: Math.random()*Math.PI*2,
  spd: Math.random()*.018+.005
}));

/* ─── fallback photos (gradient silhouette) ─── */
const FB_PALS = [
  ['#1a0030','#8b0045','#ff6b35'], ['#0d0d2b','#1a237e','#e91e8c'],
  ['#1a0010','#c62828','#ff8f00'], ['#0a0a2e','#4a148c','#e91e8c'],
  ['#000d1a','#006064','#ff4081'], ['#180018','#4a0072','#ff80ab'],
];
function makeFallback(i){
  const pw=130, ph=88, oc=document.createElement('canvas');
  oc.width=pw; oc.height=ph;
  const c=oc.getContext('2d'), pal=FB_PALS[i%FB_PALS.length];
  const g=c.createLinearGradient(0,0,0,ph);
  pal.forEach((col,j)=>g.addColorStop(j/(pal.length-1),col));
  c.fillStyle=g; c.fillRect(0,0,pw,ph);
  for(let k=0;k<22;k++){
    c.beginPath(); c.arc(Math.random()*pw,Math.random()*(ph*.6),Math.random()*1.1+.2,0,Math.PI*2);
    c.fillStyle=`rgba(255,255,255,${Math.random()*.6+.2})`; c.fill();
  }
  c.fillStyle='#000'; c.fillRect(0,ph*.73,pw,ph*.27);
  const cx=pw/2, cy=ph*.73; c.fillStyle='#000';
  c.beginPath();c.arc(cx-12,cy-26,6.5,0,Math.PI*2);c.fill();
  c.beginPath();c.moveTo(cx-12,cy-19);c.lineTo(cx-18,cy);c.lineTo(cx-6,cy);c.closePath();c.fill();
  c.beginPath();c.arc(cx+12,cy-24,5.5,0,Math.PI*2);c.fill();
  c.beginPath();c.moveTo(cx+12,cy-18);c.lineTo(cx+6,cy);c.lineTo(cx+18,cy);c.closePath();c.fill();
  const mg=c.createRadialGradient(pw*.7,ph*.22,0,pw*.7,ph*.22,25);
  mg.addColorStop(0,'rgba(255,200,100,.9)'); mg.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=mg; c.beginPath(); c.arc(pw*.7,ph*.22,25,0,Math.PI*2); c.fill();
  return oc;
}
function fitImage(img, tw, th){
  const oc=document.createElement('canvas'); oc.width=tw; oc.height=th;
  const c=oc.getContext('2d'), r=Math.max(tw/img.width, th/img.height);
  c.drawImage(img,(tw-img.width*r)/2,(th-img.height*r)/2,img.width*r,img.height*r);
  return oc;
}

let photoCanvases = [];
function loadImages(paths){
  const PW=130, PH=88;
  const list = paths.length ? paths : Array.from({length:6},(_,i)=>null);
  Promise.all(list.map((src,i) => new Promise(res => {
    if(!src) return res(makeFallback(i));
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload  = () => res(fitImage(img, PW, PH));
    img.onerror = () => res(makeFallback(i));
    img.src = src;
  }))).then(c => { photoCanvases=c; buildScene(); requestAnimationFrame(frame); });
}

/* ─── CYLINDER scene layout ─── */
const CYL_R  = 360;  // radius of cylinder
const CYL_H  = 580;  // height span of cylinder
const FOCAL  = 500;

function rand(a,b){ return Math.random()*(b-a)+a; }
const SIZES = [20,24,28,32,36,42,48];
let els = [];

function buildScene(){
  els = [];

  // Distribute angles evenly around cylinder for each layer type
  function cylPt(jitter=50){
    const angle = rand(0, Math.PI*2);
    const r = CYL_R + rand(-jitter, jitter);
    return { x: r*Math.cos(angle), z: r*Math.sin(angle), y: rand(-CYL_H/2, CYL_H/2) };
  }

  // Texts — wrap around cylinder
  for(let i=0;i<58;i++){
    const pt = cylPt(35);
    els.push({ type:'text', ...pt,
      size:  SIZES[Math.floor(Math.random()*SIZES.length)],
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      rotZ:  rand(-22,22),
      pulsePhase: rand(0,Math.PI*2) });
  }

  // Photos — on the cylinder wall
  const nP = Math.max(photoCanvases.length*2, 10);
  for(let i=0;i<nP;i++){
    const pt = cylPt(20);
    els.push({ type:'photo', ...pt,
      photoIdx:   i % photoCanvases.length,
      rotZ:       rand(-14,14),
      rotYLocal:  rand(0,Math.PI*2),
      vrotYLocal: rand(-0.007,0.007),
      pulsePhase: rand(0,Math.PI*2) });
  }

  // Hearts — scattered at varying depths
  for(let i=0;i<22;i++){
    const pt = cylPt(100); // hearts spread wider
    els.push({ type:'heart', ...pt,
      size: rand(16,50),
      pulsePhase: rand(0,Math.PI*2) });
  }
}

/* ─── 3D transform ─── */
function transformPt(px, py, pz){
  // Spin around Y axis
  const cy=Math.cos(-rotY), sy=Math.sin(-rotY);
  let x1= px*cy + pz*sy, y1=py, z1=-px*sy + pz*cy;
  // Tilt around X axis
  const cx=Math.cos(-rotX), sx=Math.sin(-rotX);
  return [ x1, y1*cx - z1*sx, y1*sx + z1*cx ];
}

function project(x, y, z){
  const d = FOCAL + z;
  if(d < 20) return null;
  const s = (FOCAL / d) * zoom;
  return { sx: x*s + W/2, sy: y*s + H/2, scale: s, depth: z };
}

/* ─── render loop ─── */
let t = 0;
function frame(ts){
  t = ts * .001;
  ctx.clearRect(0, 0, W, H);

  // Smooth zoom
  zoom += (targetZoom - zoom) * 0.1;

  // Inertia + auto-spin
  if(!dragging){
    velY *= .92; velX *= .92;
    rotY += velY; rotX += velX;
    rotX = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, rotX));
    if(Math.abs(velY) < .001) rotY += .0007;
  }

  // Stars (screen-space, unaffected by zoom)
  for(const s of STARS){
    s.tw += s.spd;
    const a = s.a*(.35 + .55*Math.sin(s.tw));
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.shadowBlur=0; ctx.fill();
  }

  // Project + sort
  const projected = [];
  for(const el of els){
    const floatY = el.y + Math.sin(t*.45 + el.pulsePhase) * 7;
    const [rx,ry,rz] = transformPt(el.x, floatY, el.z);
    const p = project(rx, ry, rz);
    if(!p) continue;
    // Fade elements behind viewer
    let alpha = 1;
    const behind = -FOCAL * 0.2;
    if(rz < behind) alpha = Math.max(0, 1 - (-rz + behind)/(FOCAL*.8));
    if(alpha < 0.02) continue;
    projected.push({el, ...p, alpha});
  }
  projected.sort((a,b) => a.depth - b.depth);

  for(const item of projected){
    const {el, sx, sy, scale, alpha} = item;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.scale(scale, scale);
    ctx.rotate(el.rotZ * Math.PI/180);
    ctx.globalAlpha = alpha;

    if(el.type === 'text'){
      const p = 1 + .04*Math.sin(t*2 + el.pulsePhase);
      ctx.scale(p, p);
      ctx.font = `bold ${el.size}px 'Dancing Script',cursive`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor = el.color.shadow; ctx.shadowBlur = 28;
      ctx.fillStyle   = el.color.fill;
      ctx.fillText(LOVE_TEXT, 0, 0);
      ctx.shadowBlur  = 7;
      ctx.fillText(LOVE_TEXT, 0, 0);

    } else if(el.type === 'photo' && photoCanvases.length){
      el.rotYLocal += el.vrotYLocal;
      const sq = Math.abs(Math.cos(el.rotYLocal)) || 0.01;
      const img = photoCanvases[el.photoIdx];
      const pw=img.width, ph=img.height;
      ctx.scale(sq, 1);
      ctx.shadowColor='#ff1493'; ctx.shadowBlur=14;
      ctx.strokeStyle='rgba(255,77,166,0.65)'; ctx.lineWidth=2/scale;
      ctx.beginPath(); ctx.roundRect(-pw/2,-ph/2,pw,ph,5); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.save(); ctx.beginPath(); ctx.roundRect(-pw/2,-ph/2,pw,ph,5); ctx.clip();
      ctx.drawImage(img,-pw/2,-ph/2); ctx.restore();

    } else if(el.type === 'heart'){
      const p = 1 + .1*Math.sin(t*3 + el.pulsePhase);
      ctx.scale(p, p);
      ctx.font=`${el.size}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='#ff1493'; ctx.shadowBlur=18;
      ctx.fillStyle='#ff4da6';
      ctx.fillText('❤', 0, 0);
    }

    ctx.restore();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  requestAnimationFrame(frame);
}

loadImages(IMAGE_FILES);
</script>
</body>
</html>
